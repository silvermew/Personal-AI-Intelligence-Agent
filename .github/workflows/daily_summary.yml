name: Daily Robotics Summary (Showcase Only)

on:
  # We removed 'schedule' to prevent duplicate emails.
  # This stays here so people can see you know how to use Manual Triggers.
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run summarizer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SECONDARY_EMAIL: ${{ secrets.SECONDARY_EMAIL }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          MAIN_EMAIL: ${{ secrets.MAIN_EMAIL }}
        run: python summarizer.py
